# Health Platform Configuration

# Owner name (used in reports)
owner: YourName

# Display preferences
display:
  units: metric  # metric | imperial
  
  # Unit conversions applied when querying
  # Weight: stored as lb, displayed as kg (×0.453592)
  # Height: stored as cm, displayed as cm
  # Distance: stored as mi, displayed as km (×1.60934)
  # Temperature: stored as degF, displayed as °C ((F-32)×5/9)

# Python interpreter (use your venv if you have one)
venv: python3

# Data storage paths
data:
  # Consolidated data directory — all user data lives here
  # DB, logs, reports, recipes, gurus, digest-state, user-profile all go here
  data_dir: ~/health-data

  # iCloud folder where Health Auto Export saves CSV files
  icloud_folder: ~/Library/Mobile Documents/com~apple~CloudDocs/Health Data

  # Optional: override individual paths (if not set, derived from data_dir)
  # db_path: ~/health-data/health.duckdb
  # log_dir: ~/health-data/logs
  # reports_dir: ~/health-data/reports
