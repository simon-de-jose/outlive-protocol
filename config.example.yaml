# Health Platform Configuration — Example
# Copy this file to config.yaml and customize for your setup.

# Owner
owner: YourName

# Display preferences
display:
  units: metric  # metric | imperial

# Python venv path (must have duckdb, pyyaml, requests, pandas)
venv: ~/clawd/.venv/bin/python

# Data storage paths
data:
  # DuckDB database file
  db_path: ~/clawd/userdata/health/health.duckdb
  
  # Log directory for import/validation logs
  log_dir: ~/clawd/userdata/health/logs

  # Reports directory for weekly/monthly reports
  reports_dir: ~/clawd/userdata/health/reports
  
  # iCloud folder where Health Auto Export saves CSV files
  # Change "Health Data" to whatever folder name you configured in Health Auto Export
  icloud_folder: ~/Library/Mobile Documents/com~apple~CloudDocs/Health Data

# LibreView CSV filename prefix (used to identify glucose export files)
# Set to your LibreView export prefix, e.g., "YourName_glucose_"
# Leave empty to match all CSV files containing "glucose" in the name
libre_csv_prefix: ""
